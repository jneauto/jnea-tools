<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set Password</title>
    <link rel="stylesheet" href="https://jneauto.github.io/jnea_css/jnea-theme.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            margin: 0;
            font-family: var(--jne-font, Arial, sans-serif);
            background: var(--jne-bg);
            color: var(--jne-text);
        }

        .auth-wrap {
            max-width: 460px;
            margin: 40px auto;
            padding: 20px;
        }

        .auth-card {
            background: white;
            border-radius: var(--jne-radius-lg);
            box-shadow: var(--jne-shadow-lg);
            padding: 26px;
        }

        .auth-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            color: var(--jne-muted);
            margin-bottom: 22px;
        }

        label {
            display: block;
            font-weight: 700;
            margin-top: 14px;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 11px;
            border: 1px solid var(--jne-border);
            border-radius: var(--jne-radius-md);
            font-size: 15px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            border: 0;
            border-radius: var(--jne-radius-md);
            background: var(--jne-primary);
            color: white;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
        }

        .message {
            margin-top: 16px;
            padding: 10px;
            border-radius: var(--jne-radius-md);
            display: none;
        }

        .message.ok {
            display: block;
            background: #e8f5e9;
            color: #1b5e20;
        }

        .message.err {
            display: block;
            background: #ffebee;
            color: #b71c1c;
        }
    </style>
</head>
<body>
    <div class="auth-wrap">
        <div class="auth-card">
            <div class="auth-title">Set Password</div>
            <div class="auth-subtitle">Create a password for future logins.</div>

            <form id="passwordForm">
                <label for="password">New Password</label>
                <input id="password" type="password" autocomplete="new-password" required minlength="8" />

                <label for="confirmPassword">Confirm Password</label>
                <input id="confirmPassword" type="password" autocomplete="new-password" required minlength="8" />

                <button type="submit">Save Password</button>
            </form>

            <div id="message" class="message"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://xxvvvipivmfmqfeevqok.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh4dnZ2aXBpdm1mbXFmZWV2cW9rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4NjUzNTMsImV4cCI6MjA5NTQ0MTM1M30.hLzj2g3RuRZRvssMG1tNg538ZdPfWHvofhMZta56lxA";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const passwordForm = document.getElementById("passwordForm");
        const messageBox = document.getElementById("message");

        function showMessage(text, type)
        {
            messageBox.textContent = text;
            messageBox.className = "message " + type;
        }

        async function ensureSessionFromUrl()
        {
            const url = new URL(window.location.href);

            if (url.searchParams.has("code"))
            {
                const code = url.searchParams.get("code");
                const result = await supabaseClient.auth.exchangeCodeForSession(code);

                if (result.error)
                {
                    showMessage(result.error.message, "err");
                    return false;
                }

                window.history.replaceState({}, document.title, window.location.pathname);
                return true;
            }

            const sessionResult = await supabaseClient.auth.getSession();

            if (sessionResult.data.session)
            {
                return true;
            }

            showMessage("This password link is expired or invalid. Please request a new invite or password reset.", "err");
            return false;
        }

        passwordForm.addEventListener("submit", async function(event)
        {
            event.preventDefault();

            const hasSession = await ensureSessionFromUrl();

            if (!hasSession)
            {
                return;
            }

            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            if (password !== confirmPassword)
            {
                showMessage("Passwords do not match.", "err");
                return;
            }

            const result = await supabaseClient.auth.updateUser(
            {
                password: password
            });

            if (result.error)
            {
                showMessage(result.error.message, "err");
                return;
            }

            showMessage("Password saved. Redirecting to login...", "ok");

            await supabaseClient.auth.signOut();

            setTimeout(function()
            {
                window.location.href = "auth-login.html";
            }, 1200);
        });

        ensureSessionFromUrl();
    </script>
</body>
</html>
